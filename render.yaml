services:
  - type: web
    name: shitledge-api
    env: docker
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_URL
        value: jdbc:h2:mem:prodtest
      - key: DB_DRIVER
        value: org.h2.Driver
      - key: DB_USERNAME
        value: sa
      - key: DB_PASSWORD
        value: ''
